<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <div class="login-box">
      <h2>Đăng Nhập</h2>

      <input type="text" id="username" placeholder="Tài Khoản" />

      <input type="password" id="password" placeholder="Mật Khẩu" />

      <button onclick="login()">ĐĂNG NHẬP</button>

      <p id="message"></p>
    </div>

    <script src="login.js"></script>
  </body>
</html>
